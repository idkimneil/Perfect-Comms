name: Update downloads badge

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6h
  release:
    types: [published, edited, deleted]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute total downloads
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          total=$(gh api --paginate repos/${{ github.repository }}/releases \
            --jq '[.[].assets[].download_count] | add // 0')
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"Downloads","message":"%s","color":"24C8DB"}\n' "$total" \
            > .github/badges/downloads.json
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet .github/badges/downloads.json; then
            git add .github/badges/downloads.json
            git commit -m "chore: update downloads badge"
            git push
          fi
